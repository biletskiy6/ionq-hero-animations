  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

age = document.getElementById('page');\n    const fit = () => {};\n    this._fit = fit; window.addEventListener('resize', fit);\n    requestAnimationFrame(fit); setTimeout(fit, 300);\n    const W = 1344, H = 460, dpr = Math.min(2, window.devicePixelRatio || 1);\n    const setup = (c) => {\n      c.width = W * dpr; c.height = H * dpr;\n      const ctx = c.getContext('2d'); ctx.scale(dpr, dpr);\n      return ctx;\n    };\n    const COL = { cyan: '111,230,255', blue: '106,168,255', purple: '185,140,255', white: '255,255,255', green: '74,222,128' };\n    const ion = (ctx, x, y, r, rgb, a) => {\n      const g = ctx.createRadialGradient(x, y, 0, x, y, r * 5);\n      g.addColorStop(0, `rgba(${rgb},${a})`);\n      g.addColorStop(.35, `rgba(${rgb},${a * .35})`);\n      g.addColorStop(1, `rgba(${rgb},0)`);\n      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r * 5, 0, 7); ctx.fill();\n      ctx.fillStyle = `rgba(255,255,255,${Math.min(1, a * 1.1)})`;\n      ctx.beginPath(); ctx.arc(x, y, r * .55, 0, 7); ctx.fill();\n    };\n    const palette = [COL.cyan, COL.purple, COL.cyan, COL.white, COL.purple, COL.cyan, COL.purple];\n    const chainPts = (t, amp) => {\n      const pts = [];\n      for (let i = 0; i < 7; i++) {\n        const x = 150 + i * ((W - 300) / 6);\n        const y = 150 + Math.sin(i * 1.15 + t * .5) * (amp || 26);\n        pts.push({ x, y, rgb: palette[i] });\n      }\n      return pts;\n    };\n    const dashPath = (ctx, pts, offset, rgb, a) => {\n      ctx.save(); ctx.setLineDash([2, 9]); ctx.lineDashOffset = offset;\n      ctx.strokeStyle = `rgba(${rgb},${a})`; ctx.lineWidth = 1.6; ctx.lineCap = 'round';\n      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);\n      for (let i = 1; i < pts.length; i++) {\n        const p0 = pts[i - 1], p1 = pts[i], mx = (p0.x + p1.x) / 2;\n        ctx.bezierCurveTo(mx, p0.y, mx, p1.y, p1.x, p1.y);\n      }\n      ctx.stroke(); ctx.restore();\n    };\n    const along = (pts, f) => {\n      const seg = f * (pts.length - 1), i = Math.min(pts.length - 2, Math.floor(seg)), lt = seg - i;\n      return { x: pts[i].x + (pts[i + 1].x - pts[i].x) * lt, y: pts[i].y + (pts[i + 1].y - pts[i].y) * lt };\n    };\n\n    // V1 — living chain\n    const v1 = (c) => {\n      const ctx = setup(c);\n      const loop = () => {\n        ctx.clearRect(0, 0, W, H); ctx.globalCompositeOperation = 'lighter';\n        const t = performance.now() / 1000;\n        const pts = chainPts(t, 24);\n        dashPath(ctx, pts, -t * 38, COL.cyan, .28);\n        const nlink = Math.floor(t / 2.2) % 6;\n        dashPath(ctx, [pts[nlink], pts[nlink + 1]], -t * 62, COL.purple, .5);\n        const lp = along(pts, (t * .14) % 1);\n        pts.forEach((p, i) => {\n          const pulse = .8 + .35 * Math.sin(t * 1.5 + i * .9);\n          const near = Math.max(0, 1 - Math.hypot(p.x - lp.x, p.y - lp.y) / 90);\n          ion(ctx, p.x, p.y, (5 + near * 5) * pulse, p.rgb, .5 + near * .5);\n        });\n        ion(ctx, lp.x, lp.y, 6, COL.white, .95);\n        ctx.globalCompositeOperation = 'source-over';\n        this.raf.push(requestAnimationFrame(loop));\n      };\n      loop();\n    };\n\n    // V2 — assembly\n    const v2 = (c) => {\n      const ctx = setup(c);\n      let start = performance.now();\n      const N = 96, parts = [];\n      const targets = () => chainPts(0, 24);\n      const seed = () => {\n        const tg = targets();\n        for (let i = 0; i < N; i++) {\n          const t = tg[i % 7];\n          parts[i] = { sx: Math.random() * W, sy: Math.random() * H, tx: t.x, ty: t.y, rgb: t.rgb,\n            d: Math.random() * .5, ph: Math.random() * 7, or: 6 + Math.random() * 10, os: .4 + Math.random() };\n        }\n      };\n      seed();\n      c.addEventListener('click', () => { start = performance.now(); seed(); });\n      const ease = (x) => 1 - Math.pow(1 - x, 3);\n      const loop = () => {\n        ctx.clearRect(0, 0, W, H); ctx.globalCompositeOperation = 'lighter';\n        const t = (performance.now() - start) / 1000;\n        const tg = targets();\n        const conv = Math.min(1, Math.max(0, (t - .2) / 2.2));\n        parts.forEach((p) => {\n          const k = ease(Math.min(1, Math.max(0, (t - p.d) / 2)));\n          let x = p.sx + (p.tx - p.sx) * k, y = p.sy + (p.ty - p.sy) * k;\n          if (k >= 1) { x += Math.cos(t + p.ph) * p.or * .18; y += Math.sin(t * p.os + p.ph) * p.or * .18; }\n          ion(ctx, x, y, k < 1 ? 1.6 : 2.2, p.rgb, k < 1 ? .5 : .32);\n        });\n        if (conv > 0) {\n          dashPath(ctx, tg, -t * 45, COL.cyan, .28 * conv);\n          tg.forEach((p, i) => ion(ctx, p.x, p.y, 6 * (.7 + .3 * Math.sin(t * 2 + i)), p.rgb, .55 * conv));\n        }\n        ctx.globalCompositeOperation = 'source-over';\n        this.raf.push(requestAnimationFrame(loop));\n      };\n      loop();\n    };\n\n    // V3 — wavefunction\n    const v3 = (c) => {\n      const ctx = setup(c);\n      const wave = (t, amp, k, phase, rgb, a, yc) => {\n        ctx.strokeStyle = `rgba(${rgb},${a})`; ctx.lineWidth = 2; ctx.beginPath();\n        for (let x = 0; x <= W; x += 8) {\n          const env = Math.sin((x / W) * Math.PI);\n          const y = yc + Math.sin(x * k + t + phase) * amp * env;\n          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);\n        }\n        ctx.stroke();\n      };\n      const loop = () => {\n        ctx.clearRect(0, 0, W, H); ctx.globalCompositeOperation = 'lighter';\n        const t = performance.now() / 1000;\n        wave(t * 1.1, 46, .010, 0, COL.cyan, .22, 150);\n        wave(t * 1.4, 34, .014, 2, COL.blue, .20, 150);\n        wave(t * .9, 30, .008, 4, COL.purple, .18, 150);\n        for (let i = 0; i < 7; i++) {\n          const x = 150 + i * ((W - 300) / 6);\n          const env = Math.sin((x / W) * Math.PI);\n          const y = 150 + Math.sin(x * .010 + t * 1.1) * 46 * env;\n          ion(ctx, x, y, 6 + 2 * Math.sin(t * 3 + i), palette[i], .6);\n        }\n        ctx.globalCompositeOperation = 'source-over';\n        this.raf.push(requestAnimationFrame(loop));\n      };\n      loop();\n    };\n\n    // V4 — data streams into stats + parallax\n    const v4 = (c) => {\n      const ctx = setup(c);\n      const sec = c.closest('.hero');\n      const content = sec.querySelector('[data-parallax]');\n      let mx = 0, my = 0, tmx = 0, tmy = 0;\n      sec.addEventListener('mousemove', (e) => {\n        const r = sec.getBoundingClientRect();\n        tmx = ((e.clientX - r.left) / r.width - .5) * 2;\n        tmy = ((e.clientY - r.top) / r.height - .5) * 2;\n      });\n      sec.addEventListener('mouseleave', () => { tmx = 0; tmy = 0; });\n      const statX = [150, 570, 1000, 1430, 1850];\n      const loop = () => {\n        ctx.clearRect(0, 0, W, H); ctx.globalCompositeOperation = 'lighter';\n        const t = performance.now() / 1000;\n        mx += (tmx - mx) * .06; my += (tmy - my) * .06;\n        if (content) content.style.transform = `translate(${mx * 14}px,${my * 8}px)`;\n        ctx.save(); ctx.translate(mx * 26, my * 14 - 30);\n        const pts = chainPts(t, 18);\n        dashPath(ctx, pts, -t * 50, COL.cyan, .26);\n        pts.forEach((p, i) => ion(ctx, p.x, p.y, 5 + 1.5 * Math.sin(t * 2 + i), p.rgb, .5));\n        const bulletY = 388;\n        statX.forEach((sx, i) => {\n          const src = pts[Math.min(6, i + 1)];\n          const period = 2.6, ph = (t / period + i * .2) % 1;\n          const cx = src.x + (sx - src.x) * ph, cy = src.y + (bulletY - src.y) * ph;\n          ctx.strokeStyle = `rgba(${COL.cyan},0.10)`; ctx.lineWidth = 1;\n          ctx.beginPath(); ctx.moveTo(src.x, src.y); ctx.lineTo(sx, bulletY); ctx.stroke();\n          ion(ctx, cx, cy, 3.5, COL.cyan, .8 * (1 - ph * .3));\n          const land = Math.max(0, 1 - Math.abs(ph - 1) * 6);\n          ion(ctx, sx, bulletY, 4 + land * 6, COL.green, .3 + land * .6);\n        });\n        ctx.restore();\n        ctx.globalCompositeOperation = 'source-over';\n        this.raf.push(requestAnimationFrame(loop));\n      };\n      loop();\n    };\n\n    // V5 — ion solar system\n    const v5 = (c) => {\n      const ctx = setup(c);\n      const cx = W / 2, cy = 120;\n      const orbits = [\n        { rx: 300, ry: 70, sp: .55, rgb: COL.cyan, pr: 5, ph: 0 },\n        { rx: 470, ry: 108, sp: -.38, rgb: COL.purple, pr: 6, ph: 2 },\n        { rx: 650, ry: 150, sp: .28, rgb: COL.blue, pr: 5, ph: 4 },\n        { rx: 850, ry: 196, sp: -.2, rgb: COL.cyan, pr: 7, ph: 1 },\n        { rx: 470, ry: 108, sp: -.38, rgb: COL.green, pr: 4, ph: 3.6 }\n      ];\n      const loop = () => {\n        ctx.clearRect(0, 0, W, H); ctx.globalCompositeOperation = 'lighter';\n        const t = performance.now() / 1000;\n        // orbit rings\n        orbits.forEach((o) => {\n          ctx.save(); ctx.setLineDash([2, 10]); ctx.lineDashOffset = -t * 30 * Math.sign(o.sp);\n          ctx.strokeStyle = `rgba(${o.rgb},0.14)`; ctx.lineWidth = 1.2;\n          ctx.beginPath(); ctx.ellipse(cx, cy, o.rx, o.ry, 0, 0, 7); ctx.stroke(); ctx.restore();\n        });\n        // core star\n        const pulse = 1 + .08 * Math.sin(t * 2);\n        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 90 * pulse);\n        g.addColorStop(0, 'rgba(255,255,255,0.9)');\n        g.addColorStop(.25, `rgba(${COL.cyan},0.5)`);\n        g.addColorStop(.6, `rgba(${COL.blue},0.16)`);\n        g.addColorStop(1, `rgba(${COL.blue},0)`);\n        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, 90 * pulse, 0, 7); ctx.fill();\n        ion(ctx, cx, cy, 11, COL.white, .95);\n        // orbiting ions\n        orbits.forEach((o, i) => {\n          const a = t * o.sp + o.ph;\n          const x = cx + Math.cos(a) * o.rx, y = cy + Math.sin(a) * o.ry;\n          // comet trail\n          for (let k = 1; k <= 8; k++) {\n            const at = a - k * .05 * Math.sign(o.sp);\n            const tx = cx + Math.cos(at) * o.rx, ty = cy + Math.sin(at) * o.ry;\n            ion(ctx, tx, ty, o.pr * (1 - k / 10), o.rgb, .12 * (1 - k / 9));\n          }\n          ion(ctx, x, y, o.pr * (.85 + .25 * Math.sin(t * 3 + i)), o.rgb, .85);\n        });\n        ctx.globalCompositeOperation = 'source-over';\n        this.raf.push(requestAnimationFrame(loop));\n      };\n      loop();\n    };\n\n    // V6 — quantum circuit\n    const v6 = (c) => {\n      const ctx = setup(c);\n      const rails = 5, top = 70, gap = 64;\n      const gateCols = [280, 520, 760, 1240, 1480, 1720];\n      const gateRGB = [COL.cyan, COL.purple, COL.blue];\n      const loop = () => {\n        ctx.clearRect(0, 0, W, H); ctx.globalCompositeOperation = 'lighter';\n        const t = performance.now() / 1000;\n        for (let r = 0; r < rails; r++) {\n          const y = top + r * gap;\n          ctx.strokeStyle = 'rgba(120,160,210,0.16)'; ctx.lineWidth = 1.4;\n          ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(W - 60, y); ctx.stroke();\n          // travelling read pulse\n          const p = ((t * .07 + r * .13) % 1) * (W - 120) + 60;\n          ion(ctx, p, y, 4, COL.cyan, .8);\n        }\n        // gates\n        gateCols.forEach((gx, i) => {\n          const r = i % rails, y = top + r * gap, rgb = gateRGB[i % 3];\n          const glow = .4 + .3 * Math.sin(t * 1 + i);\n          ctx.strokeStyle = `rgba(${rgb},${.5 + glow * .4})`; ctx.lineWidth = 1.6;\n          ctx.fillStyle = `rgba(${rgb},0.10)`;\n          ctx.beginPath(); ctx.roundRect(gx - 16, y - 16, 32, 32, 6); ctx.fill(); ctx.stroke();\n          ion(ctx, gx, y, 2.5, rgb, glow);\n        });\n        // entangling CNOT link (moves down the rails)\n        const ci = Math.floor(t / 2.8) % gateCols.length;\n        const gx = gateCols[ci], ra = ci % rails, rb = (ra + 1 + (ci % 2)) % rails;\n        const ya = top + ra * gap, yb = top + rb * gap;\n        ctx.strokeStyle = `rgba(${COL.purple},0.7)`; ctx.lineWidth = 2;\n        ctx.beginPath(); ctx.moveTo(gx, ya); ctx.lineTo(gx, yb); ctx.stroke();\n        ion(ctx, gx, ya, 5, COL.purple, .9); ion(ctx, gx, yb, 5, COL.purple, .9);\n        ctx.globalCompositeOperation = 'source-over';\n        this.raf.push(requestAnimationFrame(loop));\n      };\n      loop();\n    };\n\n    // V7 — hyperspace warp\n    const v7 = (c) => {\n      const ctx = setup(c);\n      const cx = W / 2, cy = 118, N = 160, st = [];\n      const pal = [COL.cyan, COL.blue, COL.purple, COL.white];\n      for (let i = 0; i < N; i++) st.push({ a: Math.random() * 7, z: Math.random(), sp: .0002 + Math.random() * .0007, rgb: pal[i % 4] });\n      const loop = () => {\n        ctx.fillStyle = 'rgba(5,7,12,0.18)'; ctx.fillRect(0, 0, W, H);\n        ctx.globalCompositeOperation = 'lighter';\n        st.forEach((s) => {\n          s.z += s.sp; if (s.z > 1) { s.z = .02; s.a = Math.random() * 7; }\n          const rad = s.z * s.z * 1050, rad0 = (s.z - s.sp * 2.2) * (s.z - s.sp * 2.2) * 1050;\n          const ratio = 1.75;\n          const x = cx + Math.cos(s.a) * rad * ratio, y = cy + Math.sin(s.a) * rad;\n          const x0 = cx + Math.cos(s.a) * rad0 * ratio, y0 = cy + Math.sin(s.a) * rad0;\n          ctx.strokeStyle = `rgba(${s.rgb},${Math.min(1, s.z) * .7})`;\n          ctx.lineWidth = s.z * 2.2; ctx.lineCap = 'round';\n          ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x, y); ctx.stroke();\n        });\n        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 55);\n        g.addColorStop(0, 'rgba(255,255,255,0.45)'); g.addColorStop(1, `rgba(${COL.cyan},0)`);\n        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, 55, 0, 7); ctx.fill();\n        ctx.globalCompositeOperation = 'source-over';\n        this.raf.push(requestAnimationFrame(loop));\n      };\n      loop();\n    };\n\n    const map = { v1, v2, v3, v4, v5, v6, v7 };\n    document.querySelectorAll('canvas[data-viz]').forEach((c) => {\n      const fn = map[c.getAttribute('data-viz')];\n      if (fn) fn(c);\n    });\n  }\n  componentWillUnmount() { (this.raf || []).forEach((id) => cancelAnimationFrame(id)); if (this._fit) window.removeEventListener('resize', this._fit); }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
